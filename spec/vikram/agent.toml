name = "Vikram"
description = "General-purpose assistant agent."
system_prompt = "system_prompt.md"

# Local resources - relative to spec/vikram/
context_files = []
skills = []

# Shared resources - relative to spec/shared/
# skills / shared_skills point at skill folders (each holding a SKILL.md).
# Only their name + description load up front; load_skill reveals the body.
shared_context_files = ["context/production.md"]
shared_skills = ["skills/web-research"]

# Tools - names resolved from vikram.tools.TOOL_REGISTRY
tools = ["web_search"]

# MCP servers - external Model Context Protocol tool servers exposed to this
# agent. Each [[mcp_servers]] entry becomes a Pydantic AI toolset that Vikram
# starts and stops automatically per run. Reference secrets as ${ENV_VAR};
# never inline them. Uncomment and adapt:
#
# [[mcp_servers]]
# name = "fetch"                # stable id, used for errors and as the toolset id
# transport = "stdio"           # stdio | http | sse
# command = "uvx"
# args = ["mcp-server-fetch"]
#
# [[mcp_servers]]
# name = "github"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# env = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}" }
# tool_prefix = "gh"            # namespaces this server's tools as gh_*
#
# [[mcp_servers]]
# name = "docs"
# transport = "http"            # streamable HTTP MCP endpoint
# url = "https://mcp.example.com/mcp"
# headers = { Authorization = "Bearer ${DOCS_MCP_TOKEN}" }

# Hooks - programs or Python callables run at lifecycle events (PreToolUse,
# PostToolUse, UserPromptSubmit, Stop). The handler receives the event payload
# as JSON on stdin; for command hooks, exit code 2 blocks the action and stderr
# is the reason. Reference secrets as ${ENV_VAR}. See docs/hooks.md. Uncomment:
#
# [[hooks]]
# event = "UserPromptSubmit"     # fire when a prompt enters a run
# transport = "command"
# command = "./hooks/inject_context.sh"   # stdout JSON may add context or block
#
# [[hooks]]
# event = "Stop"                 # fire when a run finishes (advisory)
# transport = "python"
# entrypoint = "myhooks.notify:on_stop"   # "module:function"

# Model knobs - passed verbatim to pydantic_ai ModelSettings.
[model_settings]
temperature = 0.3                  # Sampling randomness. 0.0 = deterministic, ~1.0 = creative. Lower for assistants, higher for brainstorming.
# top_p = 0.95                     # Nucleus sampling cutoff (0–1). Alternative to temperature; usually leave at default.
# max_tokens = 2048                # Hard cap on response length. Useful to bound cost/latency.
# seed = 42                        # Reproducibility seed. Honored best-effort; Ollama support is partial.
# presence_penalty = 0.0           # -2.0 to 2.0. Positive values discourage repeating any token already used.
# frequency_penalty = 0.0          # -2.0 to 2.0. Positive values penalize tokens by usage count (stronger anti-repeat than presence).
# stop_sequences = ["</done>"]     # Strings that, if generated, end the response immediately.
# parallel_tool_calls = false      # Allow the model to issue multiple tool calls in one turn. Leave false for local Ollama models — flaky.
# thinking = "low"                 # Reasoning effort: false | true | "minimal" | "low" | "medium" | "high" | "xhigh". No-op unless the model supports reasoning (DeepSeek-R1, Qwen3-thinking, OpenAI o-series, Anthropic extended thinking).
# timeout = 60                     # Per-request timeout in seconds.
# service_tier = "auto"            # Provider routing: "auto" | "default" | "flex" | "priority". OpenAI/Anthropic only.
# extra_headers = { "X-My-Header" = "value" }   # Passthrough HTTP headers.
